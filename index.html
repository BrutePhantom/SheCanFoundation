<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact She Can Foundation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-wrapper">
    <section class="contact-card" aria-labelledby="contact-heading">
      <div class="intro">
        <p class="eyebrow">She Can Foundation</p>
        <h1 id="contact-heading">Contact She Can Foundation</h1>
        <p>We would love to hear from you. Please fill out the form below.</p>
      </div>

      <!-- The form collects basic contact details from the user. -->
      <form id="contactForm" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Write your message" required></textarea>
        </div>

        <button type="submit">Submit</button>

        <!-- JavaScript updates this paragraph after form validation. -->
        <p id="formStatus" class="form-status" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
